      run: |
        echo "构建报告" > build_report.txt
        echo "平台: macOS aarch64 (Apple Silicon)" >> build_report.txt
        echo "版本: ${{ github.ref_name }}" >> build_report.txt
        echo "提交: ${{ github.sha }}" >> build_report.txt
        echo "构建时间: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> build_report.txt
        echo "构建状态: 成功" >> build_report.txt
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: doh-toggle-macos-aarch64
        path: |
          target/aarch64-apple-darwin/release/doh_toggle
          build_report.txt
    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: build-logs-macos-aarch64
        path: target/aarch64-apple-darwin/release/build.log