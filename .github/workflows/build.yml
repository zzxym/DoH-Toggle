      run: |
        echo "构建报告" > build_report.txt
        echo "平台: macOS x86_64 (Intel)" >> build_report.txt
        echo "版本: ${{ github.ref_name }}" >> build_report.txt
        echo "提交: ${{ github.sha }}" >> build_report.txt
        echo "构建时间: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> build_report.txt
        echo "构建状态: 成功" >> build_report.txt
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: doh-toggle-macos-x86_64
        path: |
          target/x86_64-apple-darwin/release/doh_toggle
          build_report.txt
    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: build-logs-macos-x86_64
        path: target/x86_64-apple-darwin/release/build.log

  build-macos-aarch64:
    if: github.event.inputs.platform == 'all' || github.event.inputs.platform == 'macos' || github.event.inputs.platform == ''
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        target: aarch64-apple-darwin
        default: true
    - name: Cache cargo registry
      uses: actions/cache@v3
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
    - name: Cache cargo index
      uses: actions/cache@v3
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
    - name: Cache cargo build
      uses: actions/cache@v3
      with:
